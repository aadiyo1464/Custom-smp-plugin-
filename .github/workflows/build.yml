name: Build Minecraft Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build with Gradle
        run: gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: build/libs/*.jar
